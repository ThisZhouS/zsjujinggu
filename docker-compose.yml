services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: king-postgres
    environment:
      POSTGRES_USER: king
      POSTGRES_PASSWORD: king123
      POSTGRES_DB: king
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U king"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: king-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: king-server
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://king:king123@postgres:5432/king
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=king-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - MAIRUI_API_KEY=${MAIRUI_API_KEY:?MAIRUI_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://server:4000
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-掘金股}
    container_name: king-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://server:4000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
